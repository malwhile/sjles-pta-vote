name: CI - Build & Test

on:
  push:
    branches: [ main, malwhile/** ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download
      working-directory: ./server

    - name: Run Go vet
      run: go vet ./...
      working-directory: ./server

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...
      working-directory: ./server
      env:
        JWT_SECRET: test-secret-key-for-ci
        ADMIN_USER: admin
        ADMIN_PASS: password

    - name: Build binary
      run: go build -o pta-vote ./server
      working-directory: ./server

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./server/coverage.out
        flags: backend
        name: backend-coverage

  frontend-build:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      run: npm ci --legacy-peer-deps
      working-directory: ./client

    - name: Build React app
      run: npm run build
      working-directory: ./client

    - name: Run tests
      run: npm test -- --watchAll=false --passWithNoTests
      working-directory: ./client
      env:
        CI: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Download Go dependencies
      run: go mod download
      working-directory: ./server

    - name: Start backend server
      run: |
        go run ./server/main.go -setupdb &
        sleep 3
      working-directory: ./server
      env:
        JWT_SECRET: test-secret-key-for-ci
        ADMIN_USER: admin
        ADMIN_PASS: password

    - name: Check server health
      run: |
        max_attempts=10
        attempt=1
        while [ $attempt -le $max_attempts ]; do
          if curl -s http://localhost:8080/api/polls > /dev/null 2>&1; then
            echo "Server is healthy"
            exit 0
          fi
          echo "Attempt $attempt: Waiting for server..."
          sleep 1
          attempt=$((attempt + 1))
        done
        echo "Server failed to start"
        exit 1

    - name: Verify API endpoints
      run: |
        curl -s -w "\nStatus: %{http_code}\n" http://localhost:8080/api/polls | head -20
