name: Tests

on:
  push:
    branches: [ main, "*/error-handling*", "*/testing*", "*/runners*" ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with coverage
        run: go test -v -coverprofile=coverage.out ./...

      - name: Display coverage report
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: go
          fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Run build
        run: cd client && npm run build

      - name: Run tests
        run: cd client && npm test -- --watchAll=false --passWithNoTests --coverage

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Start server
        run: |
          go run ./server/main.go -setupdb &
          sleep 2

      - name: Test API endpoints
        run: |
          # Test polls endpoint
          curl -s http://localhost:8080/api/polls | grep -q "success"

          # Test admin login
          curl -s -X POST http://localhost:8080/api/admin/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"wrongpass"}' | grep -q "success"
